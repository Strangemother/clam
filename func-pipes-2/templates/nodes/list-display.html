{% extends "/nodes/node_base.html" %}
{% block main_class %}list-display{% endblock main_class %}
{% block body %}
    {% raw %}
    <h2>List Display</h2>
    <div>{{ uuid }}</div>
    <div>{{ panel.viewData.value }}</div>
    <div class="list-items-container">
        <ul class="list-items">
            <li class="list-item" v-for="item in items">
                <div :class="['message-card', 'direction-'+item.pip]">
                    {{ item.value }}
                </div>
            </li>
        </ul>

    </div>
    <div class="text-content display-flex">
        <textarea v-model='userText'>Content</textarea>
        <div>
            <button @click='sendContent'>Send</button>
        </div>
    </div>
    {% endraw %}
{% endblock body %}

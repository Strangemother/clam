{% raw %}
<!-- ── CONVERTER node ── -->
<template v-else-if="panel.type === 'converter'">
    <div class="node-body">
        <div class="converter-readout">
            <div class="conv-row conv-io">
                <div class="conv-side">
                    <div class="conv-label">In</div>
                    <div :class="['conv-val', panel.inVolts === 0 ? 'zero' : '']">
                        {{ panel.inVolts.toFixed(1) }}<span class="conv-unit">V</span>
                    </div>
                    <div :class="['conv-val', panel.inAmps === 0 ? 'zero' : '']">
                        {{ panel.inAmps.toFixed(2) }}<span class="conv-unit">A</span>
                    </div>
                </div>
                <div class="conv-arrow">
                    <span :class="['conv-ratio-badge', 'state-' + panel.state]">
                        {{ panel.ratio !== null ? panel.ratio.toFixed(2) + '×' : '—' }}
                    </span>
                    <div class="conv-arrow-sym">&#x2192;</div>
                </div>
                <div class="conv-side">
                    <div class="conv-label">Out</div>
                    <div :class="['conv-val', panel.state === 'off' ? 'zero' : '']">
                        {{ panel.outVolts.toFixed(1) }}<span class="conv-unit">V</span>
                    </div>
                    <div :class="['conv-val', panel.outAmps === 0 ? 'zero' : '']">
                        {{ panel.outAmps.toFixed(2) }}<span class="conv-unit">A</span>
                    </div>
                </div>
            </div>

            <div class="conv-dial-row">
                <button class="conv-btn conv-down" @click="converterDialDown(panel)" title="Step down output voltage">▼</button>
                <span class="conv-step-label">±{{ panel.step }}V</span>
                <button class="conv-btn conv-up"   @click="converterDialUp(panel)"   title="Step up output voltage">▲</button>
            </div>

            <div class="conv-settings">
                <label class="conv-field">
                    <span>Out V</span>
                    <input type="number" min="1" step="1"
                           v-model.number="panel.outVolts"
                           @change="converterParamsChanged(panel)" />
                </label>
                <label class="conv-field">
                    <span>Step</span>
                    <input type="number" min="0.1" step="0.1"
                           v-model.number="panel.step"
                           @change="converterParamsChanged(panel)" />
                </label>
                <label class="conv-field">
                    <span>Eff %</span>
                    <input type="number" min="1" max="100" step="1"
                           :value="Math.round(panel.efficiency * 100)"
                           @change="panel.efficiency = $event.target.value / 100; converterParamsChanged(panel)" />
                </label>
            </div>
        </div>

        <div class="ripple-row">
            <label class="ripple-toggle" :class="panel.ripple.enabled ? 'active' : ''">
                <input type="checkbox" v-model="panel.ripple.enabled" />
                ∿ Ripple
            </label>
            <template v-if="panel.ripple.enabled">
                <label class="ripple-field">
                    <span>±V</span>
                    <input type="number" min="0.01" step="0.1"
                           v-model.number="panel.ripple.amount"
                           @change="rippleParamsChanged(panel)" />
                </label>
                <label class="ripple-field">
                    <span>every</span>
                    <input type="number" min="0.05" step="0.05"
                           v-model.number="panel.ripple.interval"
                           @change="rippleParamsChanged(panel)" />
                    <span>s</span>
                </label>
            </template>
        </div>
    </div>
</template>
{% endraw %}

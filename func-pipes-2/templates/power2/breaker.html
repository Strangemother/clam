{% raw %}
<!-- ── BREAKER node ── -->
<template v-else-if="panel.type === 'breaker'">
    <div class="node-body">
        <div class="field-row">
            <label>Rating</label>
            <input type="number" v-model.number="panel.ratingAmps" min="1" step="1" />
            <span class="unit">A</span>
        </div>

        <button :class="['breaker-toggle',
                         panel.tripped ? 'tripped' :
                         panel.closed  ? 'closed'  : 'open']"
                @click="toggleBreaker(panel)">
            {{ panel.tripped ? '⚡ TRIPPED — click to reset'
             : panel.closed  ? '━ CLOSED' : '╱ OPEN' }}
        </button>

        <div class="status-row" v-if="panel.signal">
            <span class="status-label">In</span>
            <span class="status-value sv-on">
                {{ panel.signal.v }}V / {{ panel.signal.a.toFixed(1) }}A
            </span>
        </div>
    </div>
</template>
{% endraw %}

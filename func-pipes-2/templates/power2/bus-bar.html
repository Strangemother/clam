{% raw %}<!-- ── BUS BAR node ── -->
<template v-else-if="panel._isBusBar">
    <div class="node-body busbar-body">

        <!-- State badge + inbound signal -->
        <div class="decision-header">
            <span :class="['decision-badge', 'decision-' + panel.state]">
                {{ panel.state.toUpperCase() }}
            </span>
            <span class="decision-signal" v-if="panel.signal">
                {{ panel.signal.v.toFixed(1) }}V / {{ panel.signal.a.toFixed(2) }}A
            </span>
            <span class="decision-signal zero" v-else>no signal</span>
        </div>

        <!-- Per-channel weight editors -->
        <div class="busbar-channels">
            <div
                v-for="(weight, i) in panel.weights"
                :key="i"
                class="busbar-channel"
            >
                <span class="busbar-ch-label">Ch {{ i }}</span>

                <input
                    type="number"
                    class="busbar-weight-input"
                    v-model.number="panel.weights[i]"
                    min="0"
                    step="1"
                    @change="busBarApplyWeights(panel)"
                    title="Raw weight for this channel — values are normalised to 100%"
                />

                <!-- Live percentage display -->
                <span class="busbar-pct">
                    {{ panel._normWeights && panel._normWeights[i] != null
                        ? (panel._normWeights[i] * 100).toFixed(1) + '%'
                        : '—' }}
                </span>

                <!-- Active flow indicator -->
                <span
                    :class="['busbar-flow',
                             panel.signal && panel._normWeights && panel._normWeights[i] > 0
                                 ? 'active' : '']"
                >▶</span>
            </div>
        </div>

        <!-- Equalise button -->
        <button
            class="busbar-equalise-btn"
            @click="busBarEqualise(panel)"
            title="Reset all channels to equal weight"
        >
            ⊟ Equalise
        </button>

        <!-- Channel count readout -->
        <div class="busbar-footer">
            {{ panel.outputCount }} channels
        </div>

        <!-- Ripple controls -->
        <div class="ripple-row">
            <label class="ripple-toggle" :class="panel.ripple.enabled ? 'active' : ''">
                <input type="checkbox" v-model="panel.ripple.enabled" />
                ∿ Ripple
            </label>
            <template v-if="panel.ripple.enabled">
                <label class="ripple-field">
                    <span>±V</span>
                    <input type="number" min="0.01" step="0.1"
                           v-model.number="panel.ripple.amount"
                           @change="rippleParamsChanged(panel)" />
                </label>
                <label class="ripple-field">
                    <span>every</span>
                    <input type="number" min="0.05" step="0.05"
                           v-model.number="panel.ripple.interval"
                           @change="rippleParamsChanged(panel)" />
                    <span>s</span>
                </label>
            </template>
        </div>

    </div>
</template>
{% endraw %}

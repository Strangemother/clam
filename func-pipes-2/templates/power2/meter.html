{% raw %}
<!-- ── METER node ── -->
<template v-else-if="panel.type === 'meter'">
    <div class="node-body">
        <div class="meter-readout">
            <div class="meter-line">
                <span class="ml-label">V</span>
                <span :class="['ml-value', panel.volts === 0 ? 'zero' : '']">
                    {{ panel.volts.toFixed(1) }}
                </span>
                <span class="ml-unit">volts</span>
            </div>
            <div class="meter-line">
                <span class="ml-label">A</span>
                <span :class="['ml-value', panel.amps === 0 ? 'zero' : '']">
                    {{ panel.amps.toFixed(2) }}
                </span>
                <span class="ml-unit">amps</span>
            </div>
            <div class="meter-line">
                <span class="ml-label">W</span>
                <span :class="['ml-value', panel.watts === 0 ? 'zero' : '']">
                    {{ panel.watts }}
                </span>
                <span class="ml-unit">watts</span>
            </div>
        </div>
    </div>
</template>
{% endraw %}

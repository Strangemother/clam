{% raw %}
<!-- ── HEATER node ── -->
<!--
    Custom node demonstrating class inheritance (extends Load).
    All power/brownout/capacitor logic is inherited.
    This template adds the thermal simulation display.
-->
<template v-else-if="panel.type === 'heater'">
    <div class="node-body">
        <div class="field-row">
            <label>Draw</label>
            <input type="number" v-model.number="panel.watts" min="0" step="10"
                   @change="loadParamsChanged(panel)" />
            <span class="unit">W</span>
        </div>
        <div class="field-row">
            <label>Min V</label>
            <input type="number" v-model.number="panel.minVolts" min="0" step="1"
                   @change="loadParamsChanged(panel)" :disabled="panel.blown" />
            <span class="unit">V</span>
        </div>

        <div class="blown-notice" v-if="panel.blown">
            ⚡ BLOWN — press ↺ to replace
        </div>
        <div class="status-row">
            <span class="status-label">Power</span>
            <span :class="['status-value', 'sv-' + panel.state]">
                {{ panel.state.toUpperCase() }}
            </span>
        </div>

        <!-- Thermal display -->
        <div class="status-row" style="margin-top:4px">
            <span class="status-label">Temp</span>
            <span :class="['heat-state-badge', panel.heatState]">
                {{ panel.heatState }}
            </span>
            <span style="margin-left:auto; font-size:11px; color:#888">
                {{ panel.temperature.toFixed(0) }}°
            </span>
        </div>
        <div class="heat-bar-bg">
            <div :class="['heat-bar-fill', panel.heatState]"
                 :style="{ width: panel.temperature + '%' }">
            </div>
        </div>

        <!-- Heat rate controls -->
        <div class="field-row" style="margin-top:6px">
            <label>Heat °/s</label>
            <input type="number" v-model.number="panel.heatRate" min="0.1" step="0.5" style="width:46px" />
        </div>
        <div class="field-row">
            <label>Cool °/s</label>
            <input type="number" v-model.number="panel.coolRate" min="0.1" step="0.5" style="width:46px" />
        </div>
    </div>
</template>
{% endraw %}

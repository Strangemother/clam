{% raw %}
<!-- ── GENERATOR node ── -->
<template v-if="panel.type === 'gen'">
    <div class="node-body">
        <div class="gen-readout">
            <div class="rvalue">
                <div class="rv-label">Volts</div>
                <div>
                    <input type="number" v-model.number="panel.volts"
                           min="1" step="1"
                           style="width:60px; font-size:14px; font-weight:bold; color:#ffd166; background:transparent; border:none; text-align:center; padding:0"
                           @change="genParamsChanged(panel)" />
                </div>
                <div class="rv-unit">V</div>
            </div>
            <div class="rvalue">
                <div class="rv-label">Amps</div>
                <div>
                    <input type="number" v-model.number="panel.amps"
                           min="0.1" step="0.5"
                           style="width:60px; font-size:14px; font-weight:bold; color:#ffd166; background:transparent; border:none; text-align:center; padding:0"
                           @change="genParamsChanged(panel)" />
                </div>
                <div class="rv-unit">A ({{ (panel.volts * panel.amps).toFixed(0) }}W)</div>
            </div>
        </div>

        <button :class="['big-toggle',
                         panel.state === 'tripped' ? 'tripped' :
                         panel.state === 'sag'     ? 'sagging' :
                         panel.live                ? 'live'    : 'dead']"
                @click="toggleGen(panel)">
            {{ panel.state === 'tripped' ? '⚡ TRIPPED — click to reset'
             : panel.state === 'sag'     ? '⚠ SAG — overloaded'
             : panel.live                ? '■ LIVE' : '○ OFF' }}
        </button>

        <!-- Load draw readout -->
        <div class="gen-draw" v-if="panel.live || panel.state === 'tripped'">
            <div class="draw-row">
                <span class="draw-label">Draw</span>
                <span :class="['draw-value',
                    panel.drawAmps > panel.amps * 1.3  ? 'draw-crit' :
                    panel.drawAmps > panel.amps        ? 'draw-over' :
                    panel.drawAmps >= panel.amps * 0.7 ? 'draw-warn' : 'draw-ok']">
                    {{ panel.drawWatts }}W / {{ panel.drawAmps }}A
                </span>
            </div>
            <div class="draw-bar-bg">
                <div class="draw-bar-fill"
                    :class="panel.drawAmps > panel.amps * 1.3  ? 'draw-crit' :
                            panel.drawAmps > panel.amps        ? 'draw-over' :
                            panel.drawAmps >= panel.amps * 0.7 ? 'draw-warn' : ''"
                    :style="{ width: Math.min(100, (panel.drawAmps / panel.amps) * 100) + '%' }">
                </div>
            </div>
            <div class="draw-legend">
                <span>0</span>
                <span>{{ (panel.volts * panel.amps).toFixed(0) }}W rated</span>
            </div>
        </div>

        <!-- Ripple controls -->
        <div class="ripple-row">
            <label class="ripple-toggle" :class="panel.ripple.enabled ? 'active' : ''">
                <input type="checkbox" v-model="panel.ripple.enabled" />
                ∿ Ripple
            </label>
            <template v-if="panel.ripple.enabled">
                <label class="ripple-field">
                    <span>±V</span>
                    <input type="number" min="0.01" step="0.1"
                           v-model.number="panel.ripple.amount"
                           @change="rippleParamsChanged(panel)" />
                </label>
                <label class="ripple-field">
                    <span>every</span>
                    <input type="number" min="0.05" step="0.05"
                           v-model.number="panel.ripple.interval"
                           @change="rippleParamsChanged(panel)" />
                    <span>s</span>
                </label>
            </template>
        </div>
    </div>
</template>
{% endraw %}

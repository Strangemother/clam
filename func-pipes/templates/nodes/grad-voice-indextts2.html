{% raw %}
<!-- ── GRAD VOICE INDEXTTS2 node ── -->
<template v-else-if="panel.type === 'grad-voice-indextts2'">

    <div class="named-pips" style="border-right: 1px solid #1e1a3a">
        <div v-for="pip in panel.pipsInbound" :key="pip.index" class="named-pip-row">
            <div
                :class="['pip-dot',
                    disconnectMode && disconnectFirst && disconnectFirst.pip.label === pip.label && disconnectFirst.pip.index === pip.index ? 'disconnect-selected' :
                    disconnectMode ? 'disconnect-ready' : '']"
                :draggable="!disconnectMode"
                @click="disconnectMode ? disconnectPip(pip, 'inbound') : null"
                @dragstart="!disconnectMode && pipStartDrag($event, 'inbound', pip)"
                @dragend="pipEndDrag($event)"
                @dragover="pipOverDrag($event)"
                @drop="pipDrop($event, 'inbound', pip)"
                :id="`${pip.label}-inbound-${pip.index}`"
                :title="pip.name">
            </div>
            <span class="pip-name">{{ pip.name }}</span>
        </div>
    </div>

    <div class="panel-body" @mousedown="e => ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName) && e.stopPropagation()">
        <div class="panel-head" @dblclick.stop="togglePanelFocus(panel)" title="Double-click to focus this node and its direct connections">
            <span class="panel-title">{{ panel.title }}</span>
            <div class="panel-btns">
                <button v-if="focusPinState.active && focusPinState.centerId === panel.id"
                        @click.stop="clearFocusedPanels()"
                        title="Restore focused nodes to their original positions">Unpin</button>
                <button class="panel-btn-flip"
                        :class="panel.flipped ? 'flip-active' : ''"
                        @click="togglePanelFlip(panel)"
                        :title="panel.flipped ? 'Restore default left/right layout' : 'Flip left/right layout'">⇆</button>
                <button @click="stopGradVoiceIndexTTS2(panel)" :disabled="panel.state !== 'pending'" title="Stop">■</button>
                <button @click="resetPanel(panel)" title="Clear">↺</button>
                <button @click="removePanel(i)">✕</button>
            </div>
        </div>

        <div v-if="panel.state !== 'idle'" class="state-badge" :class="panel.state">
            {{ panel.state === 'pending' ? '● Sending…' : panel.state === 'error' ? '✕ Error' : '' }}
        </div>

        <div v-if="panel.lastEventId" class="pyfunc-result">event_id: {{ panel.lastEventId }}</div>
        <div v-if="panel.lastError" class="pyfunc-error">⚠ {{ panel.lastError }}</div>

        <div class="field-row" style="display:block; margin-bottom:6px">
            <label>Ref Audio</label>
            <input v-model="panel.refAudioValue"
                   type="text"
                   placeholder="upstream path or FileData JSON" />
        </div>
        <div class="pyfunc-actions" style="margin-bottom:6px; display:flex; gap:6px; align-items:center; flex-wrap:wrap">
            <input :ref="`indextts2-ref-upload-${panel.id}`"
                   type="file"
                   accept="audio/*,.wav,.mp3,.flac,.ogg,.m4a"
                   @change="setGradVoiceIndexTTS2Upload(panel, 'ref', $event)" />
            <button class="pyfunc-call-btn"
                    @click="clearGradVoiceIndexTTS2Upload(panel, 'ref')"
                    :disabled="!panel._refAudioUploadName">Clear Upload</button>
        </div>
        <div v-if="panel._refAudioUploadName" class="prompt-description" style="margin-bottom:6px">
            upload override: {{ panel._refAudioUploadName }}
        </div>

        <div class="field-row" style="display:block; margin-bottom:6px">
            <label>Emotion Audio</label>
            <input v-model="panel.emotionAudioValue"
                   type="text"
                   placeholder="optional upstream path or FileData JSON" />
        </div>
        <div class="pyfunc-actions" style="margin-bottom:6px; display:flex; gap:6px; align-items:center; flex-wrap:wrap">
            <input :ref="`indextts2-emotion-upload-${panel.id}`"
                   type="file"
                   accept="audio/*,.wav,.mp3,.flac,.ogg,.m4a"
                   @change="setGradVoiceIndexTTS2Upload(panel, 'emotion', $event)" />
            <button class="pyfunc-call-btn"
                    @click="clearGradVoiceIndexTTS2Upload(panel, 'emotion')"
                    :disabled="!panel._emotionAudioUploadName">Clear Upload</button>
        </div>
        <div v-if="panel._emotionAudioUploadName" class="prompt-description" style="margin-bottom:6px">
            upload override: {{ panel._emotionAudioUploadName }}
        </div>

        <div class="field-row" style="display:block; margin-bottom:6px">
            <label>Emotion Mode</label>
            <select v-model="panel.emotionMode">
                <option value="vector_control">vector_control</option>
                <option value="audio_reference">audio_reference</option>
            </select>
        </div>

        <div class="field-row" style="display:block; margin-bottom:6px">
            <label>Emotion Description</label>
            <textarea v-model="panel.emotionDescription"
                      rows="2"
                      placeholder="optional prompt for the emotional tone"></textarea>
        </div>

        <div class="prompt-description" style="margin-bottom:6px">Vector controls</div>
        <div style="display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:6px; margin-bottom:6px">
            <label>Alpha <input v-model.number="panel.emoAlpha" type="number" step="0.1" /></label>
            <label>Calm <input v-model.number="panel.calm" type="number" step="0.1" /></label>
            <label>Happy <input v-model.number="panel.happy" type="number" step="0.1" /></label>
            <label>Sad <input v-model.number="panel.sad" type="number" step="0.1" /></label>
            <label>Angry <input v-model.number="panel.angry" type="number" step="0.1" /></label>
            <label>Afraid <input v-model.number="panel.afraid" type="number" step="0.1" /></label>
            <label>Disgusted <input v-model.number="panel.disgusted" type="number" step="0.1" /></label>
            <label>Melancholic <input v-model.number="panel.melancholic" type="number" step="0.1" /></label>
            <label>Surprised <input v-model.number="panel.surprised" type="number" step="0.1" /></label>
        </div>

        <div class="prompt-description" style="margin-bottom:6px">Generation</div>
        <div style="display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:6px; margin-bottom:8px">
            <label>Temperature <input v-model.number="panel.temperature" type="number" step="0.1" /></label>
            <label>Top P <input v-model.number="panel.topP" type="number" step="0.1" /></label>
            <label>Top K <input v-model.number="panel.topK" type="number" step="1" /></label>
            <label>Repeat Penalty <input v-model.number="panel.repetitionPenalty" type="number" step="0.1" /></label>
            <label>Max Mel Tokens <input v-model.number="panel.maxMelTokens" type="number" step="1" /></label>
            <label>Seed <input v-model.number="panel.seed" type="number" step="1" /></label>
            <label style="display:flex; align-items:center; gap:6px; grid-column:1 / -1">
                <input v-model="panel.useRandom" type="checkbox" />
                Use random seed
            </label>
        </div>

        <div class="messages" :ref="'msgs-' + panel.id">
            <div v-if="!panel.messages.length" class="display-null">— no request yet —</div>
            <div v-for="(m, j) in panel.messages" :key="j" class="msg-row">
                <div class="msg" :class="m.role">{{ getPanelMessageText(m) }}</div>
                <button v-if="canReplayPanelMessage(panel, m)"
                        class="msg-replay-btn"
                        @click="replayPanelMessage(panel, m)"
                        title="Replay this message">↻</button>
            </div>
            <div v-if="panel.state === 'pending'" class="msg status">sending to IndexTTS2…</div>
        </div>

        <div class="panel-input">
            <textarea
                v-model="panel._manualInput"
                placeholder="Manual test input (Enter to speak)…"
                @input="touchPanelInputHistory(panel, '_manualInput')"
                @keydown.up="handlePanelInputHistoryKeydown(panel, '_manualInput', $event)"
                @keydown.down="handlePanelInputHistoryKeydown(panel, '_manualInput', $event)"
                @keydown.enter.exact.prevent="sendGradVoiceIndexTTS2Manual(panel)"
            ></textarea>
            <button @click="sendGradVoiceIndexTTS2Manual(panel)" :disabled="panel.state === 'pending'">Send</button>
        </div>
    </div>

    <div class="named-pips" style="border-left: 1px solid #1e1a3a">
        <div v-for="pip in panel.pipsOutbound" :key="pip.index" class="named-pip-row">
            <span class="pip-name">{{ pip.name }}</span>
            <div
                :class="['pip-dot',
                    disconnectMode && disconnectFirst && disconnectFirst.pip.label === pip.label && disconnectFirst.pip.index === pip.index ? 'disconnect-selected' :
                    disconnectMode ? 'disconnect-ready' : '']"
                :draggable="!disconnectMode"
                @click="disconnectMode ? disconnectPip(pip, 'outbound') : null"
                @dragstart="!disconnectMode && pipStartDrag($event, 'outbound', pip)"
                @dragend="pipEndDrag($event)"
                @dragover="pipOverDrag($event)"
                @drop="pipDrop($event, 'outbound', pip)"
                :id="`${pip.label}-outbound-${pip.index}`"
                :title="pip.name">
            </div>
        </div>
    </div>

</template>
{% endraw %}

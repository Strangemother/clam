{% raw %}
<!-- ── SYNC node ── -->
<template v-else-if="panel.type === 'sync'">
    <div class="transform-layout">

        <div class="transform-pips-col">
            <div v-for="pip in panel.pipsInbound" :key="pip.index" class="tpip-row">
                <div
                    :class="['pip-dot',
                        disconnectMode && disconnectFirst && disconnectFirst.pip.label === pip.label && disconnectFirst.pip.index === pip.index ? 'disconnect-selected' :
                        disconnectMode ? 'disconnect-ready' : '']"
                    :draggable="!disconnectMode"
                    @click="disconnectMode ? disconnectPip(pip, 'inbound') : null"
                    @dragstart="!disconnectMode && pipStartDrag($event, 'inbound', pip)"
                    @dragend="pipEndDrag($event)"
                    @dragover="pipOverDrag($event)"
                    @drop="pipDrop($event, 'inbound', pip)"
                    :id="`${pip.label}-inbound-${pip.index}`"
                    :title="pip.name">
                </div>
                <input class="pip-name-edit" v-model="pip.name" :title="'Rename: ' + pip.name" />
                <button class="pip-del"
                        @click="removeSyncInboundPip(panel, pip.index)"
                        :disabled="panel.pipsInbound.length <= 1">×</button>
            </div>
            <button class="pip-add" @click="addSyncInboundPip(panel)">＋</button>
        </div>

        <div class="panel-body" @mousedown="e => ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName) && e.stopPropagation()">
            <div class="panel-head" @dblclick.stop="togglePanelFocus(panel)" title="Double-click to focus this node and its direct connections">
                <span class="panel-title">{{ panel.title }}</span>
                <div class="panel-btns">
                    <button v-if="focusPinState.active && focusPinState.centerId === panel.id"
                            @click.stop="clearFocusedPanels()"
                            title="Restore focused nodes to their original positions">Unpin</button>
                    <button class="panel-btn-flip"
                            :class="panel.flipped ? 'flip-active' : ''"
                            @click="togglePanelFlip(panel)"
                            :title="panel.flipped ? 'Restore default left/right layout' : 'Flip left/right layout'">⇆</button>
                    <button @click="resetPanel(panel)" title="Reset buffer and clear downstream signal">↺</button>
                    <button @click="removePanel(i)">✕</button>
                </div>
            </div>

            <div class="sync-controls">
                <label class="delay-label" title="Drain automatically once this many buffered items are collected. Set to 0 to disable.">
                    Count
                    <input type="number" min="0" step="1" v-model.number="panel.countWatermark" class="delay-ms-input" />
                </label>
                <label class="delay-label" title="Drain automatically after this many milliseconds without a new message. Set to 0 to disable.">
                    Time
                    <input type="number" min="0" step="100" v-model.number="panel.delayMs" class="delay-ms-input" />
                </label>
                <label class="mode-toggle" title="Emit buffered items as an array instead of a single combined string">
                    <input type="checkbox" v-model="panel.emitList" />
                    Emit list
                </label>
            </div>

            <div class="sync-actions">
                <span class="sync-summary">
                    {{ panel.buffer.length ? panel.buffer.length + ' buffered' : 'idle' }}
                </span>
                <button class="delay-release-btn"
                        @click="drainSync(panel)"
                        :disabled="!panel.buffer.length"
                        title="Emit the current buffered batch now">
                    ⏩ Drain
                </button>
                <button class="sync-empty-btn"
                        @click="emptySync(panel)"
                        :disabled="!panel.buffer.length"
                        title="Clear the buffer without emitting anything">
                    ✕ Empty
                </button>
            </div>

            <div class="messages" :ref="'msgs-' + panel.id">
                <div v-if="!panel.buffer.length" class="display-null">— buffer empty —</div>
                <div v-for="(m, j) in panel.buffer" :key="m.receivedAt + '-' + j" class="msg-row">
                    <div class="msg" :class="m.role">{{ getPanelMessageText(m) }}</div>
                    <span class="sync-buffer-meta">{{ m.pipName }}</span>
                </div>
            </div>
        </div>

        <div class="transform-pips-col" style="align-items: flex-end">
            <div class="tpip-row">
                <span class="pip-name">out</span>
                <div
                    :class="['pip-dot',
                        disconnectMode && disconnectFirst && disconnectFirst.pip.label === panel.pipsOutbound[0].label && disconnectFirst.pip.index === panel.pipsOutbound[0].index ? 'disconnect-selected' :
                        disconnectMode ? 'disconnect-ready' : '']"
                    :draggable="!disconnectMode"
                    @click="disconnectMode ? disconnectPip(panel.pipsOutbound[0], 'outbound') : null"
                    @dragstart="!disconnectMode && pipStartDrag($event, 'outbound', panel.pipsOutbound[0])"
                    @dragend="pipEndDrag($event)"
                    @dragover="pipOverDrag($event)"
                    @drop="pipDrop($event, 'outbound', panel.pipsOutbound[0])"
                    :id="`${panel.pipsOutbound[0].label}-outbound-${panel.pipsOutbound[0].index}`"
                    :title="panel.pipsOutbound[0].name">
                </div>
            </div>
        </div>

    </div>
</template>
{% endraw %}

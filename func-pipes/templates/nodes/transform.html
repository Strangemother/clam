{% raw %}
<!-- ── TRANSFORM node ── -->
<template v-else-if="panel.type === 'transform'">
    <div class="transform-layout">

        <!-- named inbound pips (left column) -->
        <div class="transform-pips-col">
            <div v-for="pip in panel.pipsInbound" :key="pip.index" class="tpip-row">
                <div
                    :class="['pip-dot',
                        disconnectMode && disconnectFirst && disconnectFirst.pip.label === pip.label && disconnectFirst.pip.index === pip.index ? 'disconnect-selected' :
                        disconnectMode ? 'disconnect-ready' : '']"
                    :draggable="!disconnectMode"
                    @click="disconnectMode ? disconnectPip(pip, 'inbound') : null"
                    @dragstart="!disconnectMode && pipStartDrag($event, 'inbound', pip)"
                    @dragend="pipEndDrag($event)"
                    @dragover="pipOverDrag($event)"
                    @drop="pipDrop($event, 'inbound', pip)"
                    :id="`${pip.label}-inbound-${pip.index}`"
                    :title="pip.name">
                </div>
                <input class="pip-name-edit" v-model="pip.name" :title="'Rename: ' + pip.name" />
                <button class="pip-del" @click="removeInboundPip(panel, pip.index)">×</button>
            </div>
            <button class="pip-add" @click="addInboundPip(panel)">＋</button>
        </div>

        <!-- body -->
        <div class="transform-body" @mousedown="e => ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName) && e.stopPropagation()">
            <div class="panel-head">
                <span class="panel-title">{{ panel.title }}</span>
                <div class="panel-btns">
                    <button @click="resetPanel(panel)" title="Reset">↺</button>
                    <button @click="removePanel(i)">✕</button>
                </div>
            </div>

            <!-- live values readout -->
            <div class="transform-vals" v-if="panel.pipsInbound.length">
                <span v-for="pip in panel.pipsInbound" :key="pip.index" class="tv-chip">
                    <span class="tv-name">{{ pip.name }}</span>
                    <span class="tv-val">{{ panel.values[pip.name] !== undefined ? panel.values[pip.name] : '—' }}</span>
                </span>
            </div>

            <!-- gate configuration -->
            <div class="fn-section">
                <div class="field-row">
                    <label>Gate</label>
                    <select v-model="panel.gatePip">
                        <option :value="null">off</option>
                        <option v-for="pip in panel.pipsInbound" :key="pip.index" :value="pip.name">{{ pip.name }}</option>
                    </select>
                </div>
                <template v-if="panel.gatePip">
                    <div class="field-row">
                        <label>Mode</label>
                        <select v-model="panel.gateMode">
                            <option value="truthy">truthy</option>
                            <option value="matches">matches regex</option>
                            <option value="always">always</option>
                        </select>
                    </div>
                    <div class="field-row" v-if="panel.gateMode === 'matches'">
                        <label>Pattern</label>
                        <input type="text" v-model="panel.gatePattern" placeholder="regex" />
                    </div>
                </template>
            </div>

            <!-- preset picker -->
            <div class="field-row">
                <label>Preset</label>
                <select @change="setTransformPreset(panel, $event.target.value); $event.target.value = ''">
                    <option value="">— presets —</option>
                    <option v-for="p in transformPresets" :key="p.label" :value="p.src">{{ p.label }}</option>
                </select>
            </div>

            <!-- function editor -->
            <textarea class="fn-editor"
                v-model="panel.fnSrc"
                @change="_rerunTransform(panel)"
                spellcheck="false">
            </textarea>
            <div class="fn-sig">fn(text, name, inputs) → string | object | null</div>
            <div v-if="panel.fnError" class="fn-error">⚠ {{ panel.fnError }}</div>
        </div>

        <!-- named outbound pips (right column) -->
        <div class="transform-pips-col" style="align-items: flex-end">
            <div v-for="pip in panel.pipsOutbound" :key="pip.index" class="tpip-row">
                <button class="pip-del" @click="removeOutboundPip(panel, pip.index)">×</button>
                <input class="pip-name-edit" v-model="pip.name" :title="'Rename: ' + pip.name" style="text-align:right" />
                <div
                    :class="['pip-dot',
                        disconnectMode && disconnectFirst && disconnectFirst.pip.label === pip.label && disconnectFirst.pip.index === pip.index ? 'disconnect-selected' :
                        disconnectMode ? 'disconnect-ready' : '']"
                    :draggable="!disconnectMode"
                    @click="disconnectMode ? disconnectPip(pip, 'outbound') : null"
                    @dragstart="!disconnectMode && pipStartDrag($event, 'outbound', pip)"
                    @dragend="pipEndDrag($event)"
                    @dragover="pipOverDrag($event)"
                    @drop="pipDrop($event, 'outbound', pip)"
                    :id="`${pip.label}-outbound-${pip.index}`"
                    :title="pip.name">
                </div>
            </div>
            <button class="pip-add" @click="addOutboundPip(panel)">＋</button>
        </div>

    </div>
</template>
{% endraw %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Power Graph — Live Client</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #161a22;
    --border:   #2a2f3d;
    --accent:   #00e87c;
    --warn:     #f59e0b;
    --danger:   #ef4444;
    --text:     #c9d1e0;
    --muted:    #5a6272;
    --radius:   6px;
    --font-mono: 'Cascadia Code', 'Fira Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 320px 1fr;
    grid-template-areas:
      "header  header"
      "sidebar panels";
    height: 100dvh;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────────────────────────────── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  header h1 { font-size: 14px; font-weight: 600; letter-spacing: .04em; color: var(--accent); }

  #conn-status {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--muted);
    color: var(--muted);
    transition: all .2s;
  }
  #conn-status.connected    { border-color: var(--accent); color: var(--accent); }
  #conn-status.disconnected { border-color: var(--danger); color: var(--danger); }

  #conn-url {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 4px 10px;
    width: 220px;
  }

  button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 4px 12px;
    transition: border-color .15s;
  }
  button:hover  { border-color: var(--accent); color: var(--accent); }
  button:active { opacity: .7; }

  #btn-connect    { border-color: var(--accent); color: var(--accent); }
  #btn-read-all   { margin-left: auto; }

  /* ── Sidebar ─────────────────────────────────────────────────────────────── */
  aside {
    grid-area: sidebar;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .pane-title {
    padding: 8px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  /* Command builder */
  #cmd-form {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  #cmd-form label { font-size: 10px; color: var(--muted); }

  #cmd-form select,
  #cmd-form input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 4px 8px;
  }

  #cmd-form .row { display: flex; gap: 6px; }
  #cmd-form .row > * { flex: 1; }

  #btn-send {
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
    margin-top: 4px;
  }

  /* Raw JSON area */
  #raw-area {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  #raw-cmd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    height: 72px;
    padding: 6px 8px;
    resize: none;
    width: 100%;
  }

  #raw-cmd:focus { outline: 1px solid var(--accent); }

  /* Event log */
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 6px 10px;
  }

  .log-entry {
    border-left: 2px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    line-height: 1.6;
    margin-bottom: 3px;
    padding: 1px 0 1px 8px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-entry.out  { border-color: var(--accent); color: var(--text); }
  .log-entry.in   { border-color: #3b82f6; }
  .log-entry.err  { border-color: var(--danger); color: var(--danger); }
  .log-entry.info { border-color: var(--warn); color: var(--warn); }

  #btn-clear-log { padding: 3px 8px; font-size: 10px; }

  /* ── Panels grid ─────────────────────────────────────────────────────────── */
  #panels-area {
    grid-area: panels;
    overflow-y: auto;
    padding: 12px;
  }

  #panels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .panel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    padding: 10px 12px;
    transition: border-color .15s;
    user-select: none;
  }

  .panel-card:hover          { border-color: var(--accent); }
  .panel-card.selected       { border-color: var(--accent); background: #0d2018; }
  .panel-card[data-state="on"]       { border-left: 3px solid var(--accent); }
  .panel-card[data-state="blown"]    { border-left: 3px solid var(--danger); }
  .panel-card[data-state="brownout"] { border-left: 3px solid var(--warn); }
  .panel-card[data-state="tripped"]  { border-left: 3px solid var(--danger); }
  .panel-card[data-state="off"]      { border-left: 3px solid var(--muted); opacity: .7; }

  .panel-id   { font-size: 10px; color: var(--muted); }
  .panel-type { font-size: 10px; color: var(--muted); float: right; }
  .panel-label{ font-size: 12px; font-weight: 600; color: var(--text); margin: 2px 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .panel-state{ font-size: 11px; }
  .panel-state.on       { color: var(--accent); }
  .panel-state.blown    { color: var(--danger); }
  .panel-state.brownout { color: var(--warn); }
  .panel-state.tripped  { color: var(--danger); }
  .panel-state.off      { color: var(--muted); }
  .panel-watts{ font-size: 11px; color: var(--muted); }

  /* ── Detail overlay ──────────────────────────────────────────────────────── */
  #detail {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #detail.open { display: flex; }

  #detail-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 80dvh;
    overflow: hidden;
    width: 480px;
  }

  #detail-header {
    align-items: center;
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  #detail-header h2 { font-size: 14px; flex: 1; }

  #detail-body {
    overflow-y: auto;
    padding: 12px 16px;
  }

  .field-row {
    align-items: center;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    padding: 5px 0;
  }

  .field-key  { color: var(--muted); font-size: 11px; min-width: 140px; }
  .field-val  { color: var(--text); flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .field-val.editable {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 2px 6px;
    width: 100%;
  }

  #btn-detail-close { background: none; border: none; color: var(--muted); font-size: 18px; padding: 0 4px; }

  #detail-actions { display: flex; gap: 6px; padding: 10px 16px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <h1>⚡ Power Graph</h1>
  <span id="conn-status">disconnected</span>
  <!-- value="ws://localhost:8765"  -->
  <input id="conn-url" type="text" 
        value="wss://studious-bassoon-9wgj4w4jxcxj7q-8765.app.github.dev/"
        spellcheck="false">
  <button id="btn-connect">Connect</button>
  <button id="btn-read-all">Read All</button>
</header>

<!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
<aside>
  <div class="pane-title">Command Builder</div>

  <div id="cmd-form">
    <div class="row">
      <div>
        <label>op</label>
        <select id="op-select">
          <option value="toggle">toggle</option>
          <option value="set">set</option>
          <option value="reset">reset</option>
          <option value="read">read</option>
          <option value="repropagate">repropagate</option>
        </select>
      </div>
      <div>
        <label>id</label>
        <input id="op-id" type="number" min="1" placeholder="panel id">
      </div>
    </div>

    <!-- set-specific fields, shown/hidden by op -->
    <div id="set-fields" style="display:none">
      <label>key</label>
      <input id="op-key" type="text" placeholder="field name, e.g. enabled">
      <label style="margin-top:4px">value (JSON)</label>
      <input id="op-value" type="text" placeholder="false / 42 / &quot;on&quot;">
    </div>

    <button id="btn-send">Send</button>
  </div>

  <div id="raw-area">
    <div class="pane-title" style="padding:0 0 4px; border:none">Raw JSON</div>
    <textarea id="raw-cmd" spellcheck="false">{"op":"read_all"}</textarea>
    <button id="btn-send-raw">Send Raw</button>
  </div>

  <div class="pane-title" style="display:flex;align-items:center;gap:8px">
    Event Log
    <button id="btn-clear-log" style="margin-left:auto">Clear</button>
  </div>
  <div id="log"></div>
</aside>

<!-- ── Panels grid ─────────────────────────────────────────────────────────── -->
<main id="panels-area">
  <div id="panels-grid"><span style="color:var(--muted);padding:20px">Not connected.</span></div>
</main>

<!-- ── Detail overlay ──────────────────────────────────────────────────────── -->
<div id="detail">
  <div id="detail-box">
    <div id="detail-header">
      <h2 id="detail-title">Panel #?</h2>
      <button id="btn-toggle-panel">Toggle</button>
      <button id="btn-reset-panel">Reset</button>
      <button id="btn-detail-close">✕</button>
    </div>
    <div id="detail-body"></div>
    <div id="detail-actions">
      <button id="btn-set-field">Set field →</button>
      <span style="color:var(--muted);font-size:11px;margin-left:auto">Click a row to edit, then Set field</span>
    </div>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let ws            = null;
let panels        = {};    // id → panel dict (latest snapshot)
let selectedPanel = null;  // panel dict currently shown in detail overlay
let selectedField = null;  // { key, inputEl }

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  const url = document.getElementById('conn-url').value.trim();
  if (ws) { ws.close(); }

  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('connected');
    log('info', `connected to ${url}`);
    sendCmd({ op: 'read_all' });
  };

  ws.onclose = () => {
    setStatus('disconnected');
    log('info', 'connection closed');
  };

  ws.onerror = () => {
    setStatus('disconnected');
    log('err', 'WebSocket error');
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { log('err', `bad JSON: ${data}`); return; }
    handleMessage(msg);
  };
}

function sendCmd(cmd) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    log('err', 'not connected'); return;
  }
  const raw = JSON.stringify(cmd);
  ws.send(raw);
  log('out', raw);
}

// ── Message handler ──────────────────────────────────────────────────────────
function handleMessage(msg) {
  log('in', JSON.stringify(msg).slice(0, 300));

  if (msg.type === 'tick' && Array.isArray(msg.panels)) {
    ingestPanels(msg.panels);
  } else if (msg.type === 'reply' && Array.isArray(msg.panels)) {
    ingestPanels(msg.panels);
  } else if (msg.type === 'reply' && msg.panel) {
    ingestPanels([msg.panel]);
    if (selectedPanel && selectedPanel.id === msg.panel.id) {
      openDetail(panels[msg.panel.id]);
    }
  } else if (msg.type === 'error') {
    log('err', `server: ${msg.message}`);
  }
}

function ingestPanels(list) {
  list.forEach(p => { panels[p.id] = p; });
  renderGrid();
  if (selectedPanel) {
    const refreshed = panels[selectedPanel.id];
    if (refreshed) updateDetailValues(refreshed);
  }
}

// ── Grid render ──────────────────────────────────────────────────────────────
const HIDDEN_KEYS = new Set(['__proto__']);

function renderGrid() {
  const grid = document.getElementById('panels-grid');
  const sorted = Object.values(panels).sort((a, b) => a.id - b.id);

  // Keyed update — reuse existing cards
  // Remove any non-card placeholder children (e.g. the initial "Not connected" span)
  grid.querySelectorAll(':scope > :not(.panel-card)').forEach(el => el.remove());

  const existing = {};
  grid.querySelectorAll('.panel-card').forEach(el => { existing[el.dataset.id] = el; });

  const seen = new Set();
  sorted.forEach(p => {
    seen.add(String(p.id));
    let card = existing[String(p.id)];   // dataset values are always strings
    if (!card) {
      card = document.createElement('div');
      card.className = 'panel-card';
      card.dataset.id = p.id;
      grid.appendChild(card);
    }
    // Always (re)stamp inner HTML — guards against stale cards that lack spans
    if (!card.querySelector('.v-id')) {
      card.innerHTML = `
        <span class="panel-id">#<span class="v-id"></span></span>
        <span class="panel-type v-type"></span>
        <div class="panel-label v-label"></div>
        <div class="panel-state v-state"></div>
        <div class="panel-watts v-watts"></div>`;
      card.addEventListener('click', () => openDetail(panels[p.id]));
    }
    const state = p.state || 'off';
    card.dataset.state = state;
    const q = s => card.querySelector(s);   // local shorthand
    if (q('.v-id'))    q('.v-id').textContent    = p.id;
    if (q('.v-type'))  q('.v-type').textContent  = p.type || '';
    if (q('.v-label')) q('.v-label').textContent = p.label || '(unlabelled)';
    const stEl = q('.v-state');
    if (stEl) { stEl.textContent = state; stEl.className = `panel-state ${state}`; }
    const w = p.drawWatts ?? p.current_watts ?? p.watts ?? '';
    const wEl = q('.v-watts');
    if (wEl) wEl.textContent = w !== '' ? `${Number(w).toFixed(0)} W` : '';
    if (selectedPanel && selectedPanel.id === p.id) card.classList.add('selected');
    else card.classList.remove('selected');
  });

  // Remove cards no longer in the panel list
  Object.keys(existing).forEach(id => {
    if (!seen.has(id)) existing[id].remove();
  });
}

// ── Detail overlay ────────────────────────────────────────────────────────────
function openDetail(panel) {
  if (!panel) return;
  selectedPanel = panel;
  selectedField = null;
  document.getElementById('detail-title').textContent =
    `#${panel.id} — ${panel.label || panel.type}`;
  populateDetailBody(panel);
  document.getElementById('detail').classList.add('open');
  renderGrid();
}

function populateDetailBody(panel) {
  const body = document.getElementById('detail-body');
  body.innerHTML = '';
  Object.entries(panel).forEach(([key, val]) => {
    if (HIDDEN_KEYS.has(key)) return;
    const row = document.createElement('div');
    row.className = 'field-row';
    row.innerHTML = `<span class="field-key">${key}</span>`;

    const isEditable = typeof val !== 'object' || val === null;
    if (isEditable) {
      const inp = document.createElement('input');
      inp.className = 'field-val editable';
      inp.value = JSON.stringify(val);
      inp.dataset.key = key;
      inp.addEventListener('focus', () => {
        selectedField = { key, inputEl: inp };
      });
      row.appendChild(inp);
    } else {
      const sp = document.createElement('span');
      sp.className = 'field-val';
      sp.textContent = JSON.stringify(val).slice(0, 60);
      row.appendChild(sp);
    }
    body.appendChild(row);
  });
}

function updateDetailValues(panel) {
  const body = document.getElementById('detail-body');
  body.querySelectorAll('.field-val.editable').forEach(inp => {
    const key = inp.dataset.key;
    if (document.activeElement !== inp && key in panel) {
      inp.value = JSON.stringify(panel[key]);
    }
  });
}

document.getElementById('btn-detail-close').addEventListener('click', () => {
  document.getElementById('detail').classList.remove('open');
  selectedPanel = null;
  renderGrid();
});

document.getElementById('detail').addEventListener('click', (e) => {
  if (e.target === document.getElementById('detail')) {
    document.getElementById('btn-detail-close').click();
  }
});

document.getElementById('btn-toggle-panel').addEventListener('click', () => {
  if (!selectedPanel) return;
  sendCmd({ op: 'toggle', id: selectedPanel.id });
  setTimeout(() => sendCmd({ op: 'read', id: selectedPanel.id }), 120);
});

document.getElementById('btn-reset-panel').addEventListener('click', () => {
  if (!selectedPanel) return;
  sendCmd({ op: 'reset', id: selectedPanel.id });
  setTimeout(() => sendCmd({ op: 'read', id: selectedPanel.id }), 120);
});

document.getElementById('btn-set-field').addEventListener('click', () => {
  if (!selectedPanel || !selectedField) {
    log('info', 'click a field input first'); return;
  }
  let value;
  try { value = JSON.parse(selectedField.inputEl.value); }
  catch { log('err', `invalid JSON value: ${selectedField.inputEl.value}`); return; }
  sendCmd({ op: 'set', id: selectedPanel.id, key: selectedField.key, value });
  setTimeout(() => sendCmd({ op: 'read', id: selectedPanel.id }), 120);
});

// ── Command builder ──────────────────────────────────────────────────────────
document.getElementById('op-select').addEventListener('change', function () {
  document.getElementById('set-fields').style.display =
    this.value === 'set' ? '' : 'none';
});

document.getElementById('btn-send').addEventListener('click', () => {
  const op = document.getElementById('op-select').value;
  const id = parseInt(document.getElementById('op-id').value, 10);
  const cmd = { op };
  if (!isNaN(id)) cmd.id = id;
  if (op === 'set') {
    cmd.key = document.getElementById('op-key').value.trim();
    try { cmd.value = JSON.parse(document.getElementById('op-value').value); }
    catch { log('err', 'value must be valid JSON'); return; }
  }
  sendCmd(cmd);
  if (op === 'read' && !isNaN(id)) return;   // reply handled in onmessage
  if (!isNaN(id)) setTimeout(() => sendCmd({ op: 'read', id }), 120);
});

// ── Raw JSON ─────────────────────────────────────────────────────────────────
document.getElementById('btn-send-raw').addEventListener('click', () => {
  const raw = document.getElementById('raw-cmd').value.trim();
  let cmd;
  try { cmd = JSON.parse(raw); } catch { log('err', `invalid JSON: ${raw}`); return; }
  sendCmd(cmd);
});

// ── Header buttons ────────────────────────────────────────────────────────────
document.getElementById('btn-connect').addEventListener('click', connect);
document.getElementById('btn-read-all').addEventListener('click', () => sendCmd({ op: 'read_all' }));

// ── Event log ─────────────────────────────────────────────────────────────────
function log(type, text) {
  const el = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  const ts = new Date().toISOString().slice(11, 23);
  entry.textContent = `${ts}  ${text}`;
  el.prepend(entry);
  // cap at 200 entries
  while (el.children.length > 200) el.lastChild.remove();
}

document.getElementById('btn-clear-log').addEventListener('click', () => {
  document.getElementById('log').innerHTML = '';
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(s) {
  const el = document.getElementById('conn-status');
  el.textContent = s;
  el.className   = s;
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('btn-detail-close').click();
});
</script>
</body>
</html>

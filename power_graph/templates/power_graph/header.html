{% raw %}
<header>
  <h1>⚡ Power Graph</h1>
  <span :class="['conn-status', status]">{{ status }}</span>
  <input class="conn-url" v-model="wsUrl" spellcheck="false">
  <button class="btn-accent" @click="connect">Connect</button>
  <button @click="sendCmd({op:'read_all'})">Read All</button>
  <button :class="['btn-connect-mode', { active: connectMode }]"
          @click="toggleConnectMode"
          title="Make a connection between two nodes">
    {{ connectMode ? 'Cancel Connect' : 'Make Connection' }}
  </button>
  <div class="save-layout-form">
    <input v-model="saveLayoutName" type="text" placeholder="Layout name…" spellcheck="false" class="save-layout-input">
    <button @click="saveLayout" :disabled="!saveLayoutName.trim()" title="Save current layout to file">Save Layout</button>
  </div>
  <div class="scenario-controls">
    <button class="btn-scenario"
            @click="runScenario('avionics-isolation')"
            title="Tier-2 fix: isolate avionics onto a dedicated clean generator, eliminating motor-inrush brownout">
      🔧 Fix Avionics
    </button>
  </div>
</header>
{% endraw %}

<!DOCTYPE html>
<html lang="en" class="layer-space-container">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/polyclass@latest/dist/polyclass.browser-full.js"></script>
    <link rel="stylesheet" href="./static/css/index.css">
     <link rel="stylesheet" href="./static/css/winbox.min.css">
    <title>Cluster</title>
</head>

<body polyclass class='background-#222
                        color-#DDD
                        margin-0
                        layer-space-container
                        font-pack-lexend+deca-500
                        font-lexend+deca-500 letter-spacing-.1px'>

    <header class='primary background-#111'>
        <div class="logo padding-1em
                    font-size-1rem">Logo</div>
    </header>

    <div class="layer-space">

        <div class="canvas-container back">
            <canvas id="back_canvas"></canvas>
            <div class="test-indicator-container">
                <div class="test-indicator"></div>
            </div>
        </div>

        <main>
            <header>
                <h1 class="title
                            text-align-center
                            font-size-2rem">
                    Bubble View
                </h1>
            </header>

            <div class="display-none">
                {% include "./cell-template.html" %}
            </div>
        </main>


        <div class="canvas-container fore">
            <canvas id="fore_canvas"></canvas>
            <div class="test-indicator-container">
                <div class="test-indicator"></div>
            </div>
        </div>
    </div>

    {% raw %}
    <div class="admin-bar" id="mini_app">

        <div>
            <label>
                <input v-model='animateLines' @change="animateLinesCheckChange($event)" type="checkbox">
                <span class="label">Animate Draw</span>
            </label>
        </div>

        <div>
            <a href="javascript:;" @click="redrawCanvas()">Draw</a>
        </div>

        <div>
            <input v-model='newPanelName' type="text" name="panel_name" id="panel_name">
            <a href="javascript:;" @click="spawnWindow()">Spawn</a>
        </div>

        <div class="spacer"></div>

        <div>
            <a href="javascript:;" @click="stopStepHighlighted()">Stop</a>
            <a href="javascript:;" @click="stepOnceHighlighted()">Step</a>
            <a href="javascript:;" @click="startStepHighlighted()">Run</a>
        </div>

        <div class="spacer"></div>

        <a href="javascript:;" @click="restoreButton()">Restore</a>

        <div class="spacer"></div>
        <a href="javascript:;" @click="saveButton()">Save</a>
    </div>
    {% endraw %}

    <script src="./static/js/vendor/winbox.min.js"></script>
    <script src="./static/js/vendor/petite-vue.iife.js"></script>

    <script src="./static/js/src/canvas-layer.js"></script>
    <script src="./static/js/src/standalone/infinite-drag.js"></script>
    <script src="./static/js/src/standalone/winbox-infinite-drag.js"></script>

    <script src="./static/js/src/graph-walker.js"></script>
    <script src="./static/js/src/graph-highlighter.js"></script>
    <script src="./static/js/src/graph-executor.js"></script>
    <script src="./static/js/src/pipes-tool.js"></script>

    <script src="./static/js/src/pipes-winbox-app.js"></script>

    <script src="./static/js/graph-demo.js"></script>
    <script src="./static/js/pipes-ui-app.js"></script>
    <script src="./static/js/index.js"></script>

</body>
</html>

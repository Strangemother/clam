<!DOCTYPE html>
<html lang="en" class="layer-space-container">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/polyclass@latest/dist/polyclass.browser-full.js"></script>
    <link rel="stylesheet" href="./static/css/index.css">
     <link rel="stylesheet" href="./static/css/winbox.min.css">
    <title>Cluster</title>
</head>

<body polyclass class='background-#222
                        color-#DDD
                        margin-0
                        layer-space-container
                        font-pack-lexend+deca-500
                        font-lexend+deca-500 letter-spacing-.1px'>


    <header class='primary background-#111'>
        <div class="logo padding-1em
                    font-size-1rem">Logo</div>
    </header>
    <div class="layer-space">

        <div class="canvas-container back">
            <canvas id="back_canvas"></canvas>
            <div class="test-indicator-container">
                <div class="test-indicator"></div>
            </div>
        </div>

        {% raw %}
        <main>
            <header>
                <h1 class="title
                            text-align-center
                            font-size-2rem">
                    Bubble View
                </h1>
            </header>

            <div class="display-none">
                <div class="example-window" id="window_content">

                    <div class="display-panel">

                        <div class="header">
                            <!--  <h2>Header</h2>  -->
                        </div>
                        <div class="content">
                            <div class="inbound pips">
                                <ul>
                                    <li class="pip" v-for="pip in pipsInbound">
                                        <div class="draggable-pip"
                                            draggable=true
                                            @dragstart='pipStartDrag(event, "inbound", pip.index)'
                                            @dragend='pipEndDrag(event, "inbound", pip.index)'
                                            @dragover='pipOverDrag(event, "inbound", pip.index)'
                                            @drop='pipDrop(event, "inbound", pip.index)'
                                            :id="label + '-inbound-'+pip.index"
                                            >
                                            {{ pip.index }}
                                        </div>
                                    </li>
                                    <li class="add-pip">
                                        <a href="javascript:;"
                                            @click='addInboundPip()'>+</a>
                                    </li>
                                </ul>
                            </div>
                            <div class="content-value">
                                Content.
                            </div>
                            <div class="outbound pips">
                                <ul>
                                    <li class="pip"
                                        v-for="pip in pipsOutbound">
                                        <div class="draggable-pip"
                                            draggable=true
                                            @dragstart='pipStartDrag(event, "outbound", pip.index)'
                                            @dragend='pipEndDrag(event, "outbound", pip.index)'
                                            @dragover='pipOverDrag(event, "outbound", pip.index)'
                                            @drop='pipDrop(event, "outbound", pip.index)'
                                            :id="label + '-outbound-'+pip.index"
                                            >
                                            {{ pip.index }}
                                        </div>
                                    </li>
                                    <li class="add-pip">
                                        <a href="javascript:;"
                                            @click='addOutboundPip()'>+</a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <div class="footer">
                            <div class="status-bar" v-text=textStatus>
                                Status Text
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>


        <div class="canvas-container fore">
            <canvas id="fore_canvas"></canvas>
            <div class="test-indicator-container">
                <div class="test-indicator"></div>
            </div>
        </div>

    </div>

    <div class="admin-bar">

        <div id="mini_app">
            <input v-model='newPanelName' type="text" name="panel_name" id="panel_name">
            <a href="javascript:;" @click="spawnWindow()">Spawn</a>
        </div>

        <a href="javascript:;">Restore</a>

        <div class="spacer"></div>
        <a href="javascript:;">Save</a>
    </div>
    {% endraw %}

    <script src="./static/js/winbox.min.js"></script>
    <script src="./static/js/petite-vue.iife.js"></script>
    <script src="./static/js/canvas-layer.js"></script>
    <script src="./static/js/index.js"></script>
    <script src="./static/js/graph-walker.js"></script>
    <script src="./static/js/graph-demo.js"></script>
</body>
</html>

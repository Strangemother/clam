<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Text Embed PoC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body>
    <h1>Text Embed PoC</h1>
    <p>Post text once, then either embed it or retrieve the closest saved text.</p>

    {% if startup_error %}
      <pre class="error">{{ startup_error }}</pre>
    {% endif %}

    {% if result %}
      <pre>{{ result | tojson(indent=2) }}</pre>
    {% endif %}

    {% if error and error != startup_error %}
      <pre class="error">{{ error }}</pre>
    {% endif %}

    <section>
      <form method="post" action="/">
        <textarea name="text" required>{{ text }}</textarea>
        <button type="submit" name="action" value="embed">Embed</button>
        <button type="submit" name="action" value="retrieve">Retrieve</button>
      </form>
    </section>
  </body>
</html>
